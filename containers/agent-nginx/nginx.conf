events {
    worker_connections 128;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    resolver 127.0.0.11 valid=5s ipv6=off;

    limit_req_zone $binary_remote_addr zone=dashboard:10m rate=10r/s;

    # ── docs.agentwasp.com — HTTP → HTTPS redirect ────────────────────
    server {
        listen 80;
        server_name docs.agentwasp.com;
        return 301 https://$host$request_uri;
    }

    # ── docs.agentwasp.com — HTTPS ────────────────────────────────────
    server {
        listen 443 ssl;
        server_name docs.agentwasp.com;

        ssl_certificate /etc/letsencrypt/live/docs.agentwasp.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/docs.agentwasp.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        root /usr/share/nginx/docs;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
    }


    # ── agentwasp.com — HTTP → HTTPS ──────────────────────────────────
    server {
        listen 80;
        server_name agentwasp.com www.agentwasp.com;
        return 301 https://$host$request_uri;
    }

    # ── agentwasp.com — HTTPS principal ───────────────────────────────
    server {
        listen 443 ssl http2;
        server_name agentwasp.com www.agentwasp.com;

        ssl_certificate /etc/letsencrypt/live/agentwasp.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/agentwasp.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Docs — redirect /docs → /docs/ y servir archivos estáticos
        location = /docs {
            return 301 /docs/;
        }

        location /docs/ {
            alias /usr/share/nginx/docs/;
            try_files $uri $uri/ /docs/index.html;
            gzip on;
            gzip_types text/html text/css application/javascript application/json;
        }

        # Assets de Docusaurus (baseUrl='/' → /assets/, /img/)
        location /assets/ {
            alias /usr/share/nginx/docs/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /img/ {
            alias /usr/share/nginx/docs/img/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Installer entry points — served as static files BEFORE the dashboard
        # proxy so they aren't redirected to /login. The one-line install
        # command is:
        #   sudo bash -c "$(curl -fsSL https://agentwasp.com/install.sh)"
        location = /install.sh {
            root /usr/share/nginx/html;
            default_type text/x-shellscript;
            add_header Cache-Control "no-cache";
        }
        location = /install.ps1 {
            root /usr/share/nginx/html;
            default_type text/plain;
            add_header Cache-Control "no-cache";
        }
        location = /wasp-release.tar.gz {
            root /usr/share/nginx/html;
            default_type application/gzip;
            add_header Cache-Control "no-cache";
            add_header Accept-Ranges bytes;
        }

        # Landing page — no cache so updates land immediately for visitors
        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        location = /styles.css {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /app.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /logo.png    { root /usr/share/nginx/html; }
        location = /dark_logo.png { root /usr/share/nginx/html; }
        location = /favicon.png { root /usr/share/nginx/html; }
        location = /bee.png     { root /usr/share/nginx/html; }
        location = /og-image.jpg {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=86400";
        }
        location = /robots.txt {
            root /usr/share/nginx/html;
            add_header Content-Type "text/plain; charset=utf-8";
        }
        location = /sitemap.xml {
            root /usr/share/nginx/html;
            add_header Content-Type "application/xml; charset=utf-8";
        }
        location = /intro.mp4 {
            root /usr/share/nginx/html;
            add_header Accept-Ranges bytes;
        }

        # Dashboard → agent-core
        location / {
            limit_req zone=dashboard burst=20 nodelay;
            set $backend http://agent-core:8080;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
